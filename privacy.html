<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperTap — Privacy Policy</title>
    <meta name="description" content="SuperTap privacy policy. Learn how we protect your data and respect your privacy.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }

        .supertap-logo {
            font-weight: 900;
            letter-spacing: -2px;
            font-style: italic;
            background: linear-gradient(to right, #60a5fa, #2563eb, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-right: 8px;
            display: inline-block;
        }

        .content-box {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
    <link rel="stylesheet" href="lang/lang-picker.css">
    <script src="lang/translations.js"></script>
    <script src="lang/lang-engine.js" defer></script>
    <script>
        window.setLanguage = window.setLanguage || function(lang) {
            window._pendingLang = lang;
        };
    </script>
</head>

<body class="py-20 px-6">

    <div class="max-w-3xl mx-auto">
        <header class="mb-16 text-center">
            <div class="space-x-4 mb-4 flex justify-center items-center">
                <a href="index.html" class="text-blue-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition" data-i18n="nav-home">Home</a>
                <a href="store.html" class="text-blue-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition" data-i18n="nav-store">Store</a>
                <a href="https://wa.me/212674745463" class="text-blue-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition">WhatsApp</a>
                <div class="lang-picker ml-4 border-l border-white/10 pl-6"></div>
            </div>

            <div class="md:hidden flex gap-3 items-center justify-center mb-8">
                <div class="lang-picker"></div>
            </div>
            <h1 class="text-4xl font-black mt-8 uppercase italic tracking-tighter" data-i18n="privacy-title"></h1>
            <p class="text-slate-500 text-sm mt-2 uppercase tracking-widest" data-i18n="last-updated"></p>
        </header>

        <div class="content-box p-8 md:p-12 rounded-[40px] space-y-10 text-slate-300 leading-relaxed">

            <section>
                <h2 class="text-white font-bold uppercase italic mb-4" data-i18n="privacy-1-title"></h2>
                <p class="text-sm" data-i18n="privacy-1-p"></p>
            </section>

            <section>
                <h2 class="text-white font-bold uppercase italic mb-4" data-i18n="privacy-2-title"></h2>
                <p class="text-sm" data-i18n="privacy-2-p"></p>
            </section>

            <section>
                <h2 class="text-white font-bold uppercase italic mb-4" data-i18n="privacy-3-title"></h2>
                <p class="text-sm" data-i18n="privacy-3-p"></p>
            </section>

            <section>
                <h2 class="text-white font-bold uppercase italic mb-4" data-i18n="privacy-4-title"></h2>
                <p class="text-sm" data-i18n="privacy-4-p"></p>
            </section>

            <section class="pt-10 border-t border-white/5">
                <p class="text-xs italic text-slate-500" data-i18n="privacy-footer">If you have questions about your data, contact us via WhatsApp
                    or our official TikTok channel.</p>
            </section>
        </div>

        <footer class="mt-20 text-center">
            <a href="index.html" class="text-2xl supertap-logo uppercase flex items-center gap-2 justify-center">
                <img src="icon.svg" class="w-8 h-8" alt="SuperTap">
                SuperTap
            </a>
            <p class="mt-8 text-[8px] text-slate-800 font-bold uppercase tracking-widest" data-i18n="footer-copy">© 2026 SuperTap Morocco. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>

</html>
