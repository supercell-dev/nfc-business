<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperTap Round Tag — Stick & Share NFC Coin</title>
    <meta name="description" content="Stick it anywhere, share everything. Adhesive NFC coin for your phone, laptop or desk. One tap networking for just 45 DH.">
    <meta property="og:site_name" content="SuperTap">
    <meta property="og:title" content="SuperTap Round Tag — Stick & Share NFC Coin">
    <meta property="og:description" content="Adhesive NFC coin — stick it anywhere, share everything with one tap. 45 DH.">
    <meta property="og:image" content="https://getsupertap.com/supertap_logo.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-nav {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .supertap-logo {
            font-weight: 900;
            letter-spacing: -2px;
            font-style: italic;
            background: linear-gradient(to right, #60a5fa, #2563eb, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-right: 8px;
            display: inline-block;
        }
        /* 3D Round Tag (Coin) Styles */
        .coin-scene {
            width: 300px;
            height: 300px;
            perspective: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .coin-3d-wrapper {
            width: 240px;
            height: 240px;
            position: absolute;
            left: 30px;
            top: 30px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            cursor: grab;
        }

        .coin-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .coin-front, .coin-back {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: #1e293b;
            border-radius: 50%;
            backface-visibility: hidden;
            border: 2px solid rgba(59, 130, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .coin-front {
            transform: translateZ(5px);
        }

        .coin-back {
            transform: rotateY(180deg) translateZ(5px);
            background: #0f172a;
        }

        /* Sides for thickness - multiple rings to simulate a rim */
        .coin-rim {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            border-radius: 50%;
            background: #334155;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .rim-1 { transform: translateZ(2px); }
        .rim-2 { transform: translateZ(-2px); }

        [data-i18n] { min-height: 1em; }
    </style>
    <script src="translations.js" defer></script>
</head>

<body class="flex flex-col min-h-screen">
    <nav class="sticky top-0 z-50 glass-nav">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="text-2xl supertap-logo uppercase flex items-center gap-2">
                <img src="icon.svg" class="w-8 h-8" alt="SuperTap">
                SuperTap
            </a>
            <div class="space-x-10 text-[11px] font-black uppercase tracking-[0.2em] hidden md:flex items-center">
                <a href="index.html" class="hover:text-blue-400 transition" data-i18n="nav-home"></a>
                <a href="store.html" class="hover:text-blue-400 transition text-blue-400" data-i18n="nav-store"></a>
                <a href="services.html" class="hover:text-blue-400 transition" data-i18n="nav-services"></a>
                <div class="flex items-center gap-3 ml-4 border-l border-white/10 pl-6">
                    <button onclick="setLanguage('en')" class="text-[14px]">🇺🇸</button>
                    <button onclick="setLanguage('fr')" class="text-[14px]">🇫🇷</button>
                    <button onclick="setLanguage('ar')" class="text-[14px]">🇲🇦</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-20 w-full grid md:grid-cols-2 gap-16 items-center">
        <!-- 3D Preview -->
        <div class="text-center">
            <div class="mb-12">
                <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-4" data-i18n="round-coin"></h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs font-bold" data-i18n="round-coin-desc"></p>
            </div>

            <div class="coin-scene" onmousemove="handleMove(event, this)" onmouseleave="handleLeave(this)">
                <div class="coin-3d-wrapper">
                    <div class="coin-inner">
                        <div class="coin-rim rim-1"></div>
                        <div class="coin-rim rim-2"></div>
                        <div class="coin-front">
                            <span class="text-xl font-black italic opacity-20 uppercase">SuperTap</span>
                        </div>
                        <div class="coin-back">
                        </div>
                    </div>
                </div>
            </div>
            
            <p class="text-slate-500 text-[10px] mt-8 uppercase font-bold tracking-widest" data-i18n="hover-rotate">Hover to rotate</p>
            <div class="mt-12 text-3xl font-black italic"><span data-i18n="price-round">45</span> <span data-i18n="currency">DH</span></div>
            <a href="https://wa.me/212674745463?text=Order%20Round%20Tag" class="btn-primary inline-block mt-6 px-12 py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-blue-500/20 text-white" data-i18n="buy-now"></a>
        </div>

        <!-- Features -->
        <div class="space-y-12">
            <div>
                <h2 class="text-2xl font-black uppercase italic mb-6 text-blue-500" data-i18n="advantages"></h2>
                <ul class="space-y-4 text-slate-300">
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="adhesive-backing"></strong> <span data-i18n="feat-adhesive-desc"></span></p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="minimalist-footprint"></strong> <span data-i18n="feat-footprint-desc"></span></p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="one-tap"></strong> <span data-i18n="feat-sharing-p"></span></p>
                    </li>
                </ul>
            </div>

            <div class="pt-8 border-t border-slate-900">
                <h2 class="text-xl font-bold uppercase italic mb-6 text-slate-500" data-i18n="limitations"></h2>
                <ul class="space-y-4 text-slate-500">
                    <li class="flex items-start gap-4">
                        <span class="font-bold">×</span>
                        <p class="text-xs" data-i18n="no-custom-engraving-lite">No custom engraving available.</p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="font-bold">×</span>
                        <p class="text-xs" data-i18n="one-link-limit">Only 1 quick link button.</p>
                    </li>
                </ul>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-slate-900 mt-20">
        <a href="index.html" class="text-xl supertap-logo uppercase opacity-50 flex items-center justify-center gap-2">
            <img src="icon.svg" class="w-6 h-6" alt="SuperTap">
            <span data-i18n="supertap">SuperTap</span>
        </a>
    </footer>

    <script>
        function handleMove(e, container) {
            const wrapper = container.querySelector('.coin-3d-wrapper');
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const rotateX = ((rect.height / 2) - y) / 5;
            const rotateY = (x - (rect.width / 2)) / 5;
            wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }
        function handleLeave(container) {
            container.querySelector('.coin-3d-wrapper').style.transform = `rotateX(0deg) rotateY(0deg)`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
