<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="small-tag-title">Small Tag | SuperTap</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-nav {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .supertap-logo {
            font-weight: 900;
            letter-spacing: -2px;
            font-style: italic;
            background: linear-gradient(to right, #60a5fa, #2563eb, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-right: 8px;
            display: inline-block;
        }
        /* 3D Tag Styles */
        .tag-scene {
            width: 300px;
            height: 340px;
            perspective: 900px;
            margin: 0 auto;
            position: relative;
        }

        /* The wrapper sits at the center of the scene and rotates */
        .tag-3d-wrapper {
            width: 160px;
            height: 260px;
            position: absolute;
            left: 70px;
            top: 40px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            cursor: grab;
            transform: rotateX(10deg) rotateY(-20deg);
        }

        /* depth of the tag */
        :root { --depth: 14px; }

        .tag-face {
            position: absolute;
            backface-visibility: hidden;
        }

        /* Front face */
        .tag-front {
            width: 160px;
            height: 260px;
            background: linear-gradient(160deg, #1e3a5f 0%, #1e293b 60%);
            border-radius: 18px;
            border: 1.5px solid rgba(59, 130, 246, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(7px);
            box-shadow: inset 0 0 40px rgba(59,130,246,0.08);
        }

        /* Back face */
        .tag-back {
            width: 160px;
            height: 260px;
            background: #0f172a;
            border-radius: 18px;
            border: 1.5px solid rgba(59, 130, 246, 0.15);
            transform: rotateY(180deg) translateZ(7px);
        }

        /* Left side */
        .tag-side-left {
            width: var(--depth);
            height: 260px;
            background: linear-gradient(to right, #1e3a5f, #263c56);
            top: 0;
            left: -7px;
            transform: rotateY(-90deg) translateZ(7px);
            transform-origin: right center;
        }

        /* Right side */
        .tag-side-right {
            width: var(--depth);
            height: 260px;
            background: linear-gradient(to left, #0f1f33, #1e3a5f);
            top: 0;
            right: -7px;
            transform: rotateY(90deg) translateZ(7px);
            transform-origin: left center;
        }

        /* Top side */
        .tag-side-top {
            width: 160px;
            height: var(--depth);
            background: linear-gradient(to bottom, #263c56, #1e293b);
            top: -7px;
            left: 0;
            transform: rotateX(90deg) translateZ(7px);
            transform-origin: center bottom;
        }

        /* Bottom side */
        .tag-side-bottom {
            width: 160px;
            height: var(--depth);
            background: linear-gradient(to top, #0f1720, #1e293b);
            bottom: -7px;
            left: 0;
            transform: rotateX(-90deg) translateZ(7px);
            transform-origin: center top;
        }

        /* Subtle NFC chip mark on front */
        .tag-chip {
            width: 38px;
            height: 28px;
            border: 1.5px solid rgba(59,130,246,0.4);
            border-radius: 5px;
            background: rgba(59,130,246,0.07);
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
        }

        [data-i18n] { min-height: 1em; }
    </style>
    <script src="translations.js" defer></script>
</head>

<body class="flex flex-col min-h-screen">
    <nav class="sticky top-0 z-50 glass-nav">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="text-2xl supertap-logo uppercase flex items-center gap-2">
                <img src="icon.svg" class="w-8 h-8" alt="Logo">
                SuperTap
            </a>
            <div class="space-x-10 text-[11px] font-black uppercase tracking-[0.2em] hidden md:flex items-center">
                <a href="index.html" class="hover:text-blue-400 transition" data-i18n="nav-home"></a>
                <a href="store.html" class="hover:text-blue-400 transition text-blue-400" data-i18n="nav-store"></a>
                <a href="services.html" class="hover:text-blue-400 transition" data-i18n="nav-services"></a>
                <div class="flex items-center gap-3 ml-4 border-l border-white/10 pl-6">
                    <button onclick="setLanguage('en')" class="text-[14px]">🇺🇸</button>
                    <button onclick="setLanguage('fr')" class="text-[14px]">🇫🇷</button>
                    <button onclick="setLanguage('ar')" class="text-[14px]">🇲🇦</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-20 w-full grid md:grid-cols-2 gap-16 items-center">
        <!-- 3D Preview -->
        <div class="text-center">
            <div class="mb-12">
                <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-4" data-i18n="small-tag"></h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs font-bold" data-i18n="small-tag-desc"></p>
            </div>

            <div class="tag-scene" onmousemove="handleMove(event, this)" onmouseleave="handleLeave(this)">
                <div class="tag-3d-wrapper">
                    <div class="tag-face tag-front">
                        <span class="text-base font-black italic opacity-20 uppercase tracking-widest">SuperTap</span>
                        <div class="tag-chip"></div>
                    </div>
                    <div class="tag-face tag-back"></div>
                    <div class="tag-face tag-side-left"></div>
                    <div class="tag-face tag-side-right"></div>
                    <div class="tag-face tag-side-top"></div>
                    <div class="tag-face tag-side-bottom"></div>
                </div>
            </div>
            
            <p class="text-slate-500 text-[10px] mt-8 uppercase font-bold tracking-widest" data-i18n="hover-rotate">Hover to rotate</p>
            <div class="mt-12 text-3xl font-black italic"><span data-i18n="price-small">50</span> <span data-i18n="currency">DH</span></div>
            <a href="https://wa.me/212674745463?text=Order%20Small%20Tag" class="btn-primary inline-block mt-6 px-12 py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-blue-500/20 text-white" data-i18n="buy-now"></a>
        </div>

        <!-- Features -->
        <div class="space-y-12">
            <div>
                <h2 class="text-2xl font-black uppercase italic mb-6 text-blue-500" data-i18n="advantages"></h2>
                <ul class="space-y-4 text-slate-300">
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="ultra-portable"></strong> <span data-i18n="feat-portable-desc"></span></p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="one-tap"></strong> <span data-i18n="feat-sharing-p"></span></p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="durable-hardware"></strong> <span data-i18n="feat-durable-desc"></span></p>
                    </li>
                </ul>
            </div>

            <div class="pt-8 border-t border-slate-900">
                <h2 class="text-xl font-bold uppercase italic mb-6 text-slate-500" data-i18n="limitations"></h2>
                <ul class="space-y-4 text-slate-500">
                    <li class="flex items-start gap-4">
                        <span class="font-bold">×</span>
                        <p class="text-xs" data-i18n="no-custom-engraving-lite">No custom engraving available.</p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="font-bold">×</span>
                        <p class="text-xs" data-i18n="one-link-limit">Only 1 quick link button.</p>
                    </li>
                </ul>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-slate-900 mt-20">
        <a href="index.html" class="text-xl supertap-logo uppercase opacity-50 flex items-center justify-center gap-2">
            <img src="icon.svg" class="w-6 h-6" alt="Logo">
            <span data-i18n="supertap">SuperTap</span>
        </a>
    </footer>

    <script>
        function handleMove(e, container) {
            const wrapper = container.querySelector('.tag-3d-wrapper');
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const rotateX = ((rect.height / 2) - y) / 5;
            const rotateY = (x - (rect.width / 2)) / 5;
            wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }
        function handleLeave(container) {
            container.querySelector('.tag-3d-wrapper').style.transform = `rotateX(0deg) rotateY(0deg)`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
