<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperTap Small Tag — NFC on Your Keychain</title>
    <meta name="description" content="Tiny but powerful. Attach it to your keys and share your digital profile with a tap. Durable NFC hardware for just 50 DH.">
    <meta property="og:site_name" content="SuperTap">
    <meta property="og:title" content="SuperTap Small Tag — NFC on Your Keychain">
    <meta property="og:description" content="Attach it to your keys and share your profile with a tap. Just 50 DH.">
    <meta property="og:image" content="https://getsupertap.com/supertap_logo.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-nav {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .supertap-logo {
            font-weight: 900;
            letter-spacing: -2px;
            font-style: italic;
            background: linear-gradient(to right, #60a5fa, #2563eb, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-right: 8px;
            display: inline-block;
        }
        /* 3D Tag Scene */
        .tag-scene {
            perspective: 1200px;
            width: 200px;
            height: 300px;
            margin: 0 auto;
        }

        .tag-3d-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            cursor: pointer;
        }

        .tag-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .is-flipped {
            transform: rotateY(180deg);
        }

        .tag-front,
        .tag-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 20px 50px -10px rgba(37, 99, 235, 0.15);
        }

        .tag-back {
            transform: rotateY(180deg);
            background: #0f172a;
        }

        .tag-shine {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tag-3d-wrapper:hover .tag-shine {
            opacity: 1;
        }

        /* NFC chip detail */
        .tag-chip {
            width: 36px;
            height: 26px;
            border: 1.5px solid rgba(59, 130, 246, 0.4);
            border-radius: 5px;
            background: rgba(59, 130, 246, 0.07);
            position: absolute;
            bottom: 40px;
        }

        /* Keychain hole */
        .tag-hole {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 20px;
            background: #020617;
        }

        [data-i18n] { min-height: 1em; }
    </style>
    <link rel="stylesheet" href="lang/lang-picker.css">
    <script src="lang/translations.js"></script>
    <script src="lang/lang-engine.js" defer></script>
    <script>
        window.setLanguage = window.setLanguage || function(lang) {
            window._pendingLang = lang;
        };
    </script>
</head>

<body class="flex flex-col min-h-screen">
    <nav class="sticky top-0 z-50 glass-nav">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="text-2xl supertap-logo uppercase flex items-center gap-2">
                <img src="icon.svg" class="w-8 h-8" alt="SuperTap">
                SuperTap
            </a>
            <div class="space-x-10 text-[11px] font-black uppercase tracking-[0.2em] hidden md:flex items-center">
                <a href="index.html" class="hover:text-blue-400 transition" data-i18n="nav-home"></a>
                <a href="store.html" class="hover:text-blue-400 transition text-blue-400" data-i18n="nav-store"></a>
                <a href="services.html" class="hover:text-blue-400 transition" data-i18n="nav-services"></a>
                <div class="lang-picker ml-4 border-l border-white/10 pl-6"></div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-20 w-full grid md:grid-cols-2 gap-16 items-center">
        <!-- 3D Preview -->
        <div class="text-center">
            <div class="mb-12">
                <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-4" data-i18n="small-tag"></h1>
                <p class="text-slate-400 uppercase tracking-widest text-xs font-bold" data-i18n="small-tag-desc"></p>
            </div>

            <div class="tag-scene" onmousemove="handleMove(event, this)" onmouseleave="handleLeave(this)" onclick="flip()">
                <div class="tag-3d-wrapper" id="tag-wrapper">
                    <div class="tag-inner" id="tag-inner">
                        <div class="tag-front">
                            <div class="tag-shine"></div>
                            <div class="tag-hole"></div>
                            <span class="text-base font-black italic opacity-30 uppercase tracking-widest text-blue-400">SuperTap</span>
                            <div class="tag-chip"></div>
                        </div>
                        <div class="tag-back">
                            <div class="w-12 h-12 border-2 border-dashed border-blue-500/20 rounded-xl"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <p class="text-slate-500 text-[10px] mt-8 uppercase font-bold tracking-widest">Click to flip • Hover to rotate</p>
            <div class="mt-12 text-3xl font-black italic"><span data-i18n="price-small">50</span> <span data-i18n="currency">DH</span></div>
            <a href="https://wa.me/212674745463?text=Order%20Small%20Tag" class="btn-primary inline-block mt-6 px-12 py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-blue-500/20 text-white" data-i18n="buy-now"></a>
        </div>

        <!-- Features -->
        <div class="space-y-12">
            <div>
                <h2 class="text-2xl font-black uppercase italic mb-6 text-blue-500" data-i18n="advantages"></h2>
                <ul class="space-y-4 text-slate-300">
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="ultra-portable"></strong> <span data-i18n="feat-portable-desc"></span></p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="one-tap"></strong> <span data-i18n="feat-sharing-p"></span></p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="text-green-500 font-bold">✓</span>
                        <p class="text-sm"><strong class="text-white block" data-i18n="durable-hardware"></strong> <span data-i18n="feat-durable-desc"></span></p>
                    </li>
                </ul>
            </div>

            <div class="pt-8 border-t border-slate-900">
                <h2 class="text-xl font-bold uppercase italic mb-6 text-slate-500" data-i18n="limitations"></h2>
                <ul class="space-y-4 text-slate-500">
                    <li class="flex items-start gap-4">
                        <span class="font-bold">×</span>
                        <p class="text-xs" data-i18n="no-custom-engraving-lite">No custom engraving available.</p>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="font-bold">×</span>
                        <p class="text-xs" data-i18n="one-link-limit">Only 1 quick link button.</p>
                    </li>
                </ul>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-slate-900 mt-20">
        <a href="index.html" class="text-xl supertap-logo uppercase opacity-50 flex items-center justify-center gap-2">
            <img src="icon.svg" class="w-6 h-6" alt="SuperTap">
            <span data-i18n="supertap">SuperTap</span>
        </a>
    </footer>

    <script>
        function handleMove(e, container) {
            const wrapper = container.querySelector('.tag-3d-wrapper');
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const rotateX = ((rect.height / 2) - y) / 10;
            const rotateY = (x - (rect.width / 2)) / 10;
            wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }
        function handleLeave(container) {
            container.querySelector('.tag-3d-wrapper').style.transform = `rotateX(0deg) rotateY(0deg)`;
        }
        function flip() {
            document.getElementById('tag-inner').classList.toggle('is-flipped');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
