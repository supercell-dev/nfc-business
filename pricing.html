<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Supertap Collection | Casablanca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        
        /* 3D Container */
        .pricing-card { perspective: 1000px; }
        
        .card-3d-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            border-radius: 24px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Fast response for mouse tracking */
            will-change: transform;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .logo-text { font-weight: 900; letter-spacing: -1.5px; font-style: italic; pointer-events: none; }
        
        /* Interactive Shine */
        .shine {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 80%);
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card-3d-wrapper:hover .shine { opacity: 1; }
    </style>
</head>
<body class="py-20 px-6">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-20">
            <a href="index.html" class="text-blue-600 font-bold mb-4 inline-flex items-center gap-2 hover:translate-x-[-4px] transition-transform">
                <span>←</span> Back to Home
            </a>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 mt-4 tracking-tight uppercase">Supertap Collection</h1>
            <p class="text-slate-500 mt-2 font-medium">Available now in Casablanca</p>
        </header>

        <div class="grid md:grid-cols-3 gap-12">
            
            <div class="pricing-card" onmousemove="handleMove(event, this)" onmouseleave="handleLeave(this)">
                <div class="card-3d-wrapper mb-8">
                    <div class="shine"></div>
                    <div class="text-slate-300 logo-text text-3xl opacity-50">SUPERTAP</div>
                </div>
                <div class="px-2">
                    <h3 class="text-xl font-bold text-slate-800">Lite Card</h3>
                    <div class="text-3xl font-black mb-6">80 <span class="text-sm font-medium">DH</span></div>
                    <a href="https://wa.me/212693000093?text=Order%20Lite%20Supertap" class="block w-full py-4 text-center bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition">Order Lite</a>
                </div>
            </div>

            <div class="pricing-card" onmousemove="handleMove(event, this)" onmouseleave="handleLeave(this)">
                <div class="card-3d-wrapper mb-8 border-blue-200 shadow-xl shadow-blue-100">
                    <div class="shine"></div>
                    <div class="text-blue-600 logo-text text-4xl">SUPERTAP</div>
                    <div class="absolute top-4 right-6 text-blue-600/30 text-[9px] font-bold tracking-widest uppercase">Pro Edition</div>
                </div>
                <div class="px-2">
                    <h3 class="text-xl font-bold text-blue-600">Supertap Pro</h3>
                    <div class="text-3xl font-black mb-6 text-blue-600">150 <span class="text-sm font-medium text-slate-400">DH</span></div>
                    <a href="https://wa.me/212693000093?text=Order%20Supertap%20Pro" class="block w-full py-4 text-center bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">Order Pro</a>
                </div>
            </div>

            <div class="pricing-card" onmousemove="handleMove(event, this)" onmouseleave="handleLeave(this)">
                <div class="card-3d-wrapper mb-8 bg-slate-900 border-none shadow-2xl">
                    <div class="shine"></div>
                    <div class="text-white logo-text text-3xl">SUPERTAP</div>
                </div>
                <div class="px-2">
                    <h3 class="text-xl font-bold text-slate-900">Supertap Elite</h3>
                    <div class="text-3xl font-black mb-6 text-slate-900">250 <span class="text-sm font-medium">DH</span></div>
                    <a href="https://wa.me/212693000093?text=Order%20Supertap%20Elite" class="block w-full py-4 text-center bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition shadow-lg shadow-slate-300">Order Elite</a>
                </div>
            </div>

        </div>

        <footer class="mt-32 text-center border-t border-slate-200 pt-16">
            <p class="text-xs text-slate-400 font-black uppercase tracking-[0.3em] mb-4">Local Service</p>
            <div class="text-2xl font-black text-slate-900 tracking-tighter italic">CASABLANCA</div>
        </footer>
    </div>

    <script>
        function handleMove(e, container) {
            const card = container.querySelector('.card-3d-wrapper');
            const shine = container.querySelector('.shine');
            const rect = container.getBoundingClientRect();
            
            // Calculate mouse position relative to the card
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Calculate rotation (max 20 degrees)
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (centerY - y) / 10;
            const rotateY = (x - centerX) / 10;
            
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            // Move shine gradient with cursor
            shine.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.4) 0%, transparent 80%)`;
        }

        function handleLeave(container) {
            const card = container.querySelector('.card-3d-wrapper');
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        }
    </script>

</body>
</html>
